<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT App</title>

<style>
body{
  font-family: Arial;
  background:#f4f7fb;
  margin:0;
}

.wrapper{
  max-width:420px;
  margin:auto;
  padding:14px;
}

.header{
  background:#2e7d32;
  color:#fff;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:420px;
  margin:auto;
}

.login-card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  margin-top:20px;
}

.logo{
  width:120px;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:12px;
  background:#2e7d32;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>MAT</div>
</div>

<div class="wrapper">
  <div class="login-card">
    <img src="https://drive.google.com/thumbnail?id=1zza_SsoDx5nSzQW-UZRmPzdtUlB6TfLU" class="logo">

    <h2>Welcome Back</h2>
    <p>Login to continue</p>

    <input placeholder="Mobile / Student ID"><br><br>
    <input placeholder="Password"><br>

    <button class="btn">Login</button>
  </div>
</div>

</body>
</html>
