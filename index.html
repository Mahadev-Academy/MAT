<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT App</title>

<style>
  .premium-test-page{
  position:relative;
  padding-bottom:120px;
}

.floating-timer{

  position:fixed;

  top:0px;

  left:50%;

  transform:translateX(130px);

  z-index:9999;

  animation:floatTimer .4s ease;

}

.timer-ring{

  width:78px;

  height:78px;

  border-radius:24px;

  background:
    linear-gradient(
      135deg,
      #00c853,
      #009624
    );

  display:flex;

  align-items:center;

  justify-content:center;

  flex-direction:column;

  color:#fff;

  font-size:22px;

  font-weight:900;

  box-shadow:
    0 12px 28px rgba(0,200,83,.32);

  backdrop-filter:blur(10px);

}

@keyframes floatTimer{

  from{
    opacity:0;
    transform:
      translateY(-20px)
      scale(.9);
  }

  to{
    opacity:1;
    transform:
      translateY(0)
      scale(1);
  }

}

.timer-warning{
  animation:shake .5s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-2px);}
  50%{transform:translateX(2px);}
  75%{transform:translateX(-2px);}
  100%{transform:translateX(0);}
}

@media(max-width:768px){

  .floating-timer{

    left:auto;

    right:10px;

    transform:none;

    top:74px;

  }

}

.timer-dot-live{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff5252;
  margin-bottom:6px;
  animation:pulse 1s infinite;
}

.test-topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:0;
  padding-bottom:8px;
}

.test-mini-title{
  font-size:13px;
  color:#666;
  font-weight:700;
}

.test-main-title{
  font-size:30px;
  font-weight:900;
}

.attempt-box{
  background:#fff;
  padding:12px 18px;
  border-radius:18px;
  font-weight:800;
  box-shadow:
  0 6px 18px rgba(0,0,0,.08);
}

.progress-wrap{
  width:100%;
  height:12px;
  background:#e0e0e0;
  border-radius:50px;
  overflow:hidden;
  margin-bottom:24px;
}

.premium-progress{
  width:0%;
  height:100%;
  background:
  linear-gradient(
    90deg,
    #00c853,
    #00e676

}

.premium-question-card{

  border-radius:28px;
  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.08);

.q-top{

.q-number{

.q-badge{

.premium-option:hover{

.premium-selected{

}

.premium-submit-btn{

  left:50%;

  transform:translateX(-50%);

  height:42px;

    0 6px 16px rgba(0,200,83,.25);

}

  .test-actions{

}

.completed-btn{

.analysis-btn{

  position:absolute;

}




.analysis-card:hover{

.question-number{

.question-text{

.answer-row strong{

}


.analysis-navbar{

}

.premium-back-btn{

.score-total{

}

.premium-stats{

.stat-box{

}

.premium-analysis-card{
  background:#fff;
  border-radius:28px;

}

.premium-correct{

.premium-wrong{

.question-top{

.question-badge{

.show-exp-btn{

.exp-inner{

:root{
  --primary:#2e7d32;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#777;
  --danger:#ff5252;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Poppins', sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
.header{
  background:var(--primary);
  color:#fff;
  padding:10px 16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:sticky;
  top:0;
  z-index:100;

  max-width:420px;
  margin:0 auto;
  width:100%;

  overflow:hidden;
}


.nav-left{
  font-size:15px;
  font-weight:600;
}

.nav-right{
  display:flex;
  gap:8px;
}

.nav-right button{
  height:34px;
  padding:0 12px;
  border:none;
  border-radius:8px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:13px;
  font-weight:600;
  cursor:pointer;

  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.back-btn{
  background:#fff;
  color:#2e7d32;
}

.logout-btn{
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter: blur(6px);

  border:1px solid rgba(255,255,255,0.3);
}
.logout-btn:hover{
  background:rgba(255,255,255,0.25);
}

/* WRAPPER */
.wrapper{
  max-width:440px;
  margin:auto;
  padding:12px;
}

/* LOGIN */
.login-card{
  background:var(--card);
  border-radius:18px;
  padding:26px 20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
  text-align:center;
}

.logo{font-size:38px;margin-bottom:8px;}
.title{font-size:20px;font-weight:600;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}

.input-box{
  display:flex;
  align-items:center;
  background:#f1f3f6;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.input-box input{
  border:none;
  outline:none;
  background:none;
  flex:1;
  font-size:14px;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:15px;
  margin-top:8px;
  cursor:pointer;
}

/* DASHBOARD */
.test-card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.test-name{
  font-size:15px;
  font-weight:600;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

.start-btn{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:14px;
}

  touch-action: manipulation;

/* ====== NEXT LEVEL PROFILE UI ====== */

.progress{
  height:8px;
  background:#e0e0e0;
  border-radius:10px;
  overflow:hidden;
  margin-top:8px;
}

.progress-bar{
  height:100%;
  background:#2e7d32;
  width:0%;
  transition:width .5s ease;
}

.glass{
  background:#ffffff;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.fade-in{
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes floatUp{
  from{
    opacity:0;
    transform:
    translateY(30px)
    scale(.96);
  }

  to{
    opacity:1;
    transform:
    translateY(0)
    scale(1);
  }
}

.premium-question-card{
  animation:
  floatUp .45s ease;
}

/* ===== PREMIUM TIMER ===== */

.top-timer{

  position:absolute;

  left:50%;

  transform:translateX(-50%);

  display:flex;

  align-items:center;

  gap:8px;

  background:rgba(255,255,255,0.18);

  backdrop-filter:blur(10px);

  padding:8px 16px;

  border-radius:50px;

  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 4px 18px rgba(0,0,0,0.18);

  font-size:16px;

  font-weight:700;

  color:#fff;

  min-width:120px;

  justify-content:center;
}

.timer-dot{

  width:10px;

  height:10px;

  border-radius:50%;

  background:#ff4d4d;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.4);
  }
