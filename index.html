<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT App</title>

<style>
body{
  font-family: Arial;
  background:#f4f7fb;
  margin:0;
}

.wrapper{
  max-width:420px;
  margin:auto;
  padding:14px;
}

.header{
  background:#2e7d32;
  color:#fff;
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:420px;
  margin:auto;
}

.login-card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  margin-top:20px;
}

.logo{
  width:120px;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:12px;
  background:#2e7d32;
  color:#fff;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
  .input-box{
  display:flex;
  align-items:center;
  background:#f1f3f6;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.input-box input{
  border:none;
  outline:none;
  background:none;
  flex:1;
  font-size:14px;
}
  .input-box{
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="header">
  <div>MAT</div>
</div>

<div class="wrapper">
  <div class="login-card">
    <img src="https://drive.google.com/thumbnail?id=1zza_SsoDx5nSzQW-UZRmPzdtUlB6TfLU" class="logo">

    <h2>Welcome Back</h2>
    <p>Login to continue</p>

<div class="input-box">
  📱 <input placeholder="Mobile / Student ID">
</div>

<div class="input-box">
  🔒 <input type="password" placeholder="Password">
</div>

    <button class="btn">Login</button>
  </div>
</div>

</body>
</html>
