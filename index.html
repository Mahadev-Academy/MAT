<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAT App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2e7d32;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#777;
  --danger:#ff5252;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Poppins', sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
.header{
  background:var(--primary);
  color:#fff;
  padding:10px 16px;   /* 🔥 extra breathing space */

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:sticky;
  top:0;
  z-index:100;

  /* 🔥 MAIN FIX */
  max-width:420px;
  margin:0 auto;           /* center align */
  width:100%;
}

.nav-left{
  font-size:15px;
  font-weight:600;
}

.nav-right{
  display:flex;
  gap:8px;
}

.nav-right button{
  height:34px;
  padding:0 12px;
  border:none;
  border-radius:8px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:13px;
  font-weight:600;
  cursor:pointer;

  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.back-btn{
  background:#fff;
  color:#2e7d32;
}

.logout-btn{
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter: blur(6px);

  border:1px solid rgba(255,255,255,0.3);
}
.logout-btn:hover{
  background:rgba(255,255,255,0.25);
}

/* WRAPPER */
.wrapper{
  max-width:420px;
  margin:auto;
  padding:12px;   /* 🔥 header के बराबर */
}

/* LOGIN */
.login-card{
  background:var(--card);
  border-radius:18px;
  padding:26px 20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
  text-align:center;
}

.logo{font-size:38px;margin-bottom:8px;}
.title{font-size:20px;font-weight:600;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}

.input-box{
  display:flex;
  align-items:center;
  background:#f1f3f6;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.input-box input{
  border:none;
  outline:none;
  background:none;
  flex:1;
  font-size:14px;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:15px;
  margin-top:8px;
  cursor:pointer;
}

/* DASHBOARD */
.test-card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.test-name{
  font-size:15px;
  font-weight:600;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

.start-btn{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:14px;
}

/* TEST */
.container{padding:8px;}

.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.04);
}

.timer{
  font-weight:600;
  color:red;
  margin-bottom:8px;
  font-size:14px;
}

.option{
  padding:9px;
  border:1px solid #ddd;
  border-radius:7px;
  margin-top:5px;
  font-size:14px;
}

.selected{
  background:#d4edda;
  border-color:#28a745;
}

/* PERFORMANCE */
button, .option{
  touch-action: manipulation;
}

.status-box{
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  text-align:center;
  font-weight:500;
}

.status-box.default{ background:#e8f0fe; color:#1a73e8; }
.status-box.loading{ background:#fff4e5; color:#ff9800; }
.status-box.success{ background:#e6f4ea; color:#2e7d32; }
.status-box.error{ background:#fdecea; color:#d32f2f; }

/* ====== NEXT LEVEL PROFILE UI ====== */
.hero{
  background: linear-gradient(135deg,#2e7d32,#66bb6a);
  color:#fff;
  border-radius:18px;
  padding:18px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
  margin-bottom:12px;
}

.hero h2{margin-top:6px;font-size:20px;}
.hero small{opacity:.9}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  background:#fff;
  color:#2e7d32;
  font-weight:600;
  font-size:12px;
  margin-top:6px;
}

.progress{
  height:8px;
  background:#e0e0e0;
  border-radius:10px;
  overflow:hidden;
  margin-top:8px;
}

.progress-bar{
  height:100%;
  background:#2e7d32;
  width:0%;
  transition:width .5s ease;
}

.glass{
  background:#ffffff;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.fade-in{
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.nav-left{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:15px;
  font-weight:600;
}

.logo-img{
  width:22px;
  height:22px;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="header">
<div class="nav-left">
<img src="https://drive.google.com/thumbnail?id=1zza_SsoDx5nSzQW-UZRmPzdtUlB6TfLU" class="logo-img">
  <span>MAT</span>
</div>
  <div id="navBtns" class="nav-right"></div>
</div>

<div id="app" class="wrapper"></div>
<script src="script.js"></script>
</body>
</html>
