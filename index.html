:root{
  --primary:#2e7d32;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#222;
  --muted:#777;
  --danger:#ff5252;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Poppins', sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
.header{
  background:var(--primary);
  color:#fff;
  padding:10px 16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:sticky;
  top:0;
  z-index:100;

  max-width:420px;
  margin:0 auto;
  width:100%;

  overflow:hidden;
}


.nav-left{
  font-size:15px;
  font-weight:600;
}

.nav-right{
  display:flex;
  gap:8px;
}

.nav-right button{
  height:34px;
  padding:0 12px;
  border:none;
  border-radius:8px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:13px;
  font-weight:600;
  cursor:pointer;

  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.back-btn{
  background:#fff;
  color:#2e7d32;
}

.logout-btn{
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter: blur(6px);

  border:1px solid rgba(255,255,255,0.3);
}
.logout-btn:hover{
  background:rgba(255,255,255,0.25);
}

/* WRAPPER */
.wrapper{
  max-width:440px;
  margin:auto;
  padding:12px;
}

/* LOGIN */
.login-card{
  background:var(--card);
  border-radius:18px;
  padding:26px 20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
  text-align:center;
}

.logo{font-size:38px;margin-bottom:8px;}
.title{font-size:20px;font-weight:600;}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}

.input-box{
  display:flex;
  align-items:center;
  background:#f1f3f6;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

.input-box input{
  border:none;
  outline:none;
  background:none;
  flex:1;
  font-size:14px;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:15px;
  margin-top:8px;
  cursor:pointer;
}

/* DASHBOARD */
.test-card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.04);
}

.test-name{
  font-size:15px;
  font-weight:600;
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

.start-btn{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:14px;
}
